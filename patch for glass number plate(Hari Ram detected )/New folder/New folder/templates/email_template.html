<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <!--[if !mso]><!-->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!--<![endif]-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>

<body style="Margin: 0; background-color: rgb(239, 241, 243); min-width: 100%; padding: 0;">

    <center class="wrapper"
        style="-ms-text-size-adjust: 100%; -webkit-text-size-adjust: 100%; table-layout: fixed; width: 100%;">
        <div class="webkit" style="margin:50px;">
            <table class="outer" align="center"
                style="Margin: 0 auto; background-color: #FFFFFF; border: 1px solid lightgrey ; max-width: 600px; width: 100%;">
                <tr>
                    <td class="one-column" style="padding: 0;">
                        <table class="plain-text" width="100%" style="background-color: #FFFFFF; border-spacing: 0;">
                            <tr class="header danger" style="font-family: 'Roboto', sans-serif; letter-spacing: 0.1em;">
                                <td class="align-center"
                                    style="padding: 5px; text-align: center;color:whitesmoke;background-color:#ff3516">
                                    <span class="h3" style="font-size: larger; font-weight: 800;">{alertMessage}</span>
                                </td>
                            </tr>

                            <tr>
                                <td style="margin-top:10px;text-align: center;">
                                    <p class="h1 slim-margin"
                                        style="Margin: 0;font-family: 'Roboto', sans-serif; font-size: 15px; font-weight: 700; line-height: 1.4rem; padding: 5px;padding-bottom:0px">
                                        PlateNumber : {plateNo}</p>
                                </td>
                            </tr>

                            <tr>
                                <td style="margin-top:10px;text-align: center;">
                                    <p class="h1 slim-margin"
                                        style="Margin: 0;font-family: 'Roboto', sans-serif; font-size: 15px; font-weight: bolder; line-height: 1.4rem; padding: 5px;padding-bottom:0px">
                                        DeviceName : {deviceName}</p>
                                </td>
                            </tr>

                            <tr>
                                <td style="margin-top:10px;text-align: center;">
                                    <p class="h1 slim-margin"
                                        style="Margin: 0;font-family: 'Roboto', sans-serif; font-size: 15px; font-weight: bolder; line-height: 1.4rem; padding: 5px;padding-bottom:0px">
                                        Speed : {vehicleSpeed}</p>
                                </td>
                            </tr>

                            <tr>
                                <td class="align-center" style="padding-bottom: 20px; text-align: center;">
                                    <p class="h1 slim-margin"
                                        style="Margin: 0;font-family: 'Roboto', sans-serif; font-size: 15px; font-weight: bolder; line-height: 1.4rem; padding: 5px;">
                                        {dateattime}</p>
                                </td>
                            </tr>


                            <tr>
                                <td class="align-center" style="padding-bottom: 20px; text-align: left;">
                                    <p class="h1 slim-margin"
                                        style="Margin: 0;font-family: 'Roboto', sans-serif; font-size: 12px; font-weight: bolder; line-height: 1.4rem; padding: 5px;">
                                        {message}</p>
                                </td>
                            </tr>

                            <tr>
                                <td style="text-align: center;">
                                    <img src="cid:{key2}" alt="PlateImage" />
                                </td>
                            </tr>

                            <tr>
                                <td style="text-align: center;">
                                    <img src="cid:{key1}" alt="FullImage" style="height:400px;width:99%" />
                                </td>
                            </tr>

                            <tr>
                                <td
                                    style="text-align: center;background-color: #F6F8F9; padding: 15px 0px;margin-top:20px ">
                                    <p class="h1 slim-margin"
                                        style="Margin: 0;font-family: 'Roboto', sans-serif; font-size: 11px;line-height: 1.4rem;color: #676767">
                                        Copyright © i2v Systems Pvt. Ltd. 2022 All Rights Reserved.</p>
                                </td>
                            </tr>

                        </table>
                    </td>
                </tr>
            </table>
            <!--[if (gte mso 9)|(IE)]>
                </td>
              </tr>
            </table>
            <![endif]-->
        </div>
    </center>

</body>

</html>
