
<html>
<head>
    <meta charset="utf-8" />
    <title>license</title>
    <link rel="stylesheet" href="/views/toastr.css" />
    <style>

        .heading {
            font-family: sans-serif;
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .formDiv {
            margin-left: 30%;
            margin-right: 30%;
            padding: 20px;
            height: 400px;
            user-select: none
        }

        .outerDiv {
            display: table;
            width: 100%
        }

        .innerDiv {
            width: 50%;
            display: table-cell;
            text-align: center;
            padding: 30px;
        }

            .innerDiv > p {
                color: white;
            }

            .innerDiv > textarea {
                color: white;
                background-color: lavender;
                margin-bottom: 20px;
                border-radius: 10px;
                width: 80%;
                margin-right: 10%;
                margin-left: 10%;
                min-height: 80px;
                resize: vertical;
                max-height: 150px;
            }

        .txtArea {
            border: solid 0.5px lightblue;
            width: 80%;
            margin-right: 10%;
            margin-left: 10%;
            border-radius: 10px;
            height: 130px;
            background: lavender;
            margin-bottom: 10px;
            resize: none;
        }

            .txtArea:focus {
                outline: none;
            }

        .ActivateBtn {
            box-shadow: 0px 3px 1px -2px rgba(0, 0, 0, 0.2), 0px 2px 2px 0px rgba(0, 0, 0, 0.14), 0px 1px 5px 0px rgba(0, 0, 0, 0.12);
            border-radius: 4px;
            color: white;
            background-color: #57b846;
            color: #fff;
            height: 50px;
            min-width: 193px;
            cursor: pointer;
            border: 0px;
            padding: 0.25px;
            font-size: 17px;
            font-family: sans-serif;
            margin:10px;
        }

            .ActivateBtn:hover {
                font-size: 19px;
            }

            .ActivateBtn:focus {
                outline: none;
            }

        .GenerateBtn {
            box-shadow: 0px 3px 1px -2px rgba(0, 0, 0, 0.2), 0px 2px 2px 0px rgba(0, 0, 0, 0.14), 0px 1px 5px 0px rgba(0, 0, 0, 0.12);
            border-radius: 4px;
            color: white;
            background-color: #2196f3;
            height: 50px;
            min-width: 193px;
            cursor: pointer;
            border: 0px;
            padding: 0.25px;
            font-size: 17px;
            font-family: sans-serif;
            margin:10px;
        }

            .GenerateBtn:focus {
                outline: none;
            }

            .GenerateBtn:hover {
                font-size: 19px;
            }

        .chooseFile {
            cursor: pointer;
        }

            .chooseFile:hover {
                color: deepskyblue;
            }

        .compName {
            position: relative;
            top: -60px;
            margin-left: 20px;
            text-align: center;
            font-size: 31px;
            color: white;
            display: inline-block;
            font-family: sans-serif
        }

        .logo {
            width: 128px;
            height: 128px;
            display: inline-block
        }
    </style>

</head>
